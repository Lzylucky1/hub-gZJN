<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询助手 - Function Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
            min-height: 400px;
            max-height: 600px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #fff;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        .message-tool {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-family: monospace;
            font-size: 13px;
        }

        .tool-name {
            color: #1565c0;
            font-weight: 600;
        }

        .tool-args {
            color: #555;
            margin-left: 8px;
        }

        .tool-result {
            color: #333;
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .chat-input-area {
            padding: 16px;
            background: #fff;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-input:disabled {
            background: #f8f9fa;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .elapsed-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }

        .example-questions {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .example-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .example-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🌤️ 天气查询助手</h1>
            <p>基于 Function Call 链式调用，先查经纬度再查天气</p>
            <div class="example-questions">
                <button class="example-btn" onclick="sendQuestion('银川今天天气怎么样')">银川天气</button>
                <button class="example-btn" onclick="sendQuestion('北京的经纬度')">北京经纬度</button>
                <button class="example-btn" onclick="sendQuestion('杭州未来三天天气')">杭州预报</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-bubble">
                    你好！我是天气查询助手。请输入城市名称，我会先查询经纬度，再查询天气。
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="输入问题，例如：银川今天天气怎么样？" onkeypress="handleKeyPress(event)">
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuestion(question) {
            chatInput.value = question;
            sendMessage();
        }

        async function sendMessage() {
            const question = chatInput.value.trim();
            if (!question) return;

            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;

            addMessage('user', question);

            const loadingMsg = addLoadingMessage();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question }),
                });

                const result = await response.json();

                removeMessage(loadingMsg);

                if (result.error) {
                    addMessage('assistant', `❌ 错误：${result.error}`);
                } else {
                    if (result.tool_calls && result.tool_calls.length > 0) {
                        result.tool_calls.forEach((tc, index) => {
                            addToolMessage(tc.name, tc.args, index + 1);
                        });
                    }
                    addMessage('assistant', result.answer);
                    if (result.elapsed) {
                        addElapsedTime(result.elapsed);
                    }
                }
            } catch (error) {
                removeMessage(loadingMsg);
                addMessage('assistant', `❌ 请求失败：${error.message}`);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
            `;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function addToolMessage(name, args, index) {
            const toolDiv = document.createElement('div');
            toolDiv.className = 'message-tool';
            const argsStr = JSON.stringify(args, null, 2);
            toolDiv.innerHTML = `
                <div><span class="tool-name">工具调用 ${index}</span>: <span class="tool-name">${name}</span><span class="tool-args">(${JSON.stringify(args)})</span></div>
            `;
            chatMessages.appendChild(toolDiv);
            scrollToBottom();
            return toolDiv;
        }

        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="loading"></div>
                    <span style="margin-left: 8px;">正在查询...</span>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv;
        }

        function removeMessage(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        function addElapsedTime(elapsed) {
            const timeDiv = document.createElement('div');
            timeDiv.className = 'elapsed-time';
            timeDiv.textContent = `⏱️ 耗时：${elapsed.toFixed(1)}秒`;
            chatMessages.appendChild(timeDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.focus();
    </script>
</body>
</html>
